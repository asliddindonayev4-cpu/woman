<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xotini - Oila Chati</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fce4ec; margin: 0; }
        .chat-container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #fff; }
        header { padding: 15px; background: #d81b60; color: white; text-align: center; font-weight: bold; font-size: 20px; }
        
        /* Xabarlar maydoni */
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-color: #fce4ec; }
        
        /* Xabar pufakchalari */
        .msg-card { 
            padding: 10px 15px; 
            border-radius: 15px; 
            max-width: 80%; 
            word-wrap: break-word; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: #000 !important; 
        }
        
        /* Xotinining xabari (O'ngda - Pushti) */
        .sent { align-self: flex-end; background: #f8bbd0; border-bottom-right-radius: 2px; }
        /* Erining xabari (Chapda - Oq) */
        .received { align-self: flex-start; background: #ffffff; border-bottom-left-radius: 2px; }
        
        .sender-name { font-size: 11px; font-weight: bold; color: #ad1457; margin-bottom: 3px; }
        .text-content { font-size: 16px; line-height: 1.4; color: #000; }
        .time-stamp { font-size: 10px; color: #888; text-align: right; margin-top: 5px; }

        .input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; padding-left: 20px; }
        button { background: #d81b60; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="chat-container">
        <header>AYOLIM ❤️</header>
        <div id="chatBox" class="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Xabar yozing..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // DIQQAT: Bu sizning Firebase ma'lumotlaringiz. O'zgartirmang!
        const firebaseConfig = {
            apiKey: "AIzaSyBg3gwfAr7Rkp9hAZxgbJeDdEIf2WZL1yU",
            authDomain: "chat-cb6f4.firebaseapp.com",
            databaseURL: "https://chat-cb6f4-default-rtdb.firebaseio.com",
            projectId: "chat-cb6f4",
            storageBucket: "chat-cb6f4.firebasestorage.app",
            messagingSenderId: "167580376836",
            appId: "1:167580376836:web:b0677a4359eb839daaba51"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        const USER_ROLE = "Xotini"; // BU YERDA ROL O'ZGARDI

        function sendMsg() {
            const msgInput = document.getElementById('msgInput');
            const text = msgInput.value.trim();
            if (text !== "") {
                push(chatRef, {
                    sender: USER_ROLE,
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                msgInput.value = "";
            }
        }

        document.getElementById('sendBtn').onclick = sendMsg;

        onChildAdded(chatRef, (snapshot) => {
            const msg = snapshot.val();
            const chatBox = document.getElementById('chatBox');
            const isMe = msg.sender === USER_ROLE;

            const msgHTML = `
                <div class="msg-card ${isMe ? 'sent' : 'received'}">
                    <div class="sender-name">${msg.sender}</div>
                    <div class="text-content">${msg.text}</div>
                    <div class="time-stamp">${msg.time}</div>
                </div>`;
            
            chatBox.insertAdjacentHTML('beforeend', msgHTML);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
