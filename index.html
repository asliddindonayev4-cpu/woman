<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oila Chati</title>
    <script src="https://8x8.vc/vpaas-magic-cookie-8877665544332211/external_api.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: black; margin: 0; }
        .chat-container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #fff; }
        header { padding: 15px; background: #075e54; color: white; display: flex; justify-content: space-between; align-items: center; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #f0f2f5; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: #fff; }
        .input-area { display: flex; padding: 10px; background: #eee; align-items: center; }
        #msgInput { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .call-btn { background: #25d366; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; }
        
        /* Qo'ng'iroq oynasi */
        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: none; background: #000; }
        .call-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 94, 84, 0.9); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1001; }
        .call-screen button { padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

    <div id="callScreen" class="call-screen">
        <h2 id="callerName">Kimdir qo'ng'iroq qilmoqda...</h2>
        <div style="display: flex;">
            <button style="background: #25d366; color: white;" onclick="acceptCall()">Javob berish ✅</button>
            <button style="background: #ff3b30; color: white;" onclick="rejectCall()">Rad etish ❌</button>
        </div>
    </div>

    <div id="video-container">
        <button onclick="closeCall()" style="position:absolute; z-index:1000; top:10px; right:10px; padding:10px; background:red; color:white; border:none; border-radius:5px;">Tugatish ❌</button>
        <div id="jitsi-container" style="height: 100%"></div>
    </div>

    <div class="chat-container">
        <header>
            <span id="roleTitle">Erim ❤️</span>
            <button class="call-btn" onclick="initiateCall()">📞</button>
        </header>
        <div id="chatBox" class="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Xabar...">
            <button onclick="sendMsg()" style="border:none; background:none; font-size:24px; cursor:pointer">➤</button>
        </div>
    </div>

    <audio id="ringtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg3gwfAr7Rkp9hAZxgbJeDdEIf2WZL1yU",
            authDomain: "chat-cb6f4.firebaseapp.com",
            databaseURL: "https://chat-cb6f4-default-rtdb.firebaseio.com",
            projectId: "chat-cb6f4",
            storageBucket: "chat-cb6f4.firebasestorage.app",
            messagingSenderId: "167580376836",
            appId: "1:167580376836:web:b0677a4359eb839daaba51"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");
        const callRef = ref(db, "currentCall");

        const USER_ROLE = "Eri"; // Ikkinchi saytda "Xotini" qiling
        document.getElementById('roleTitle').innerText = USER_ROLE;

        const ringtone = document.getElementById('ringtone');

        // 1. QO'NG'IROQNI BOSHLASH
        window.initiateCall = function() {
            set(callRef, {
                caller: USER_ROLE,
                status: "calling",
                timestamp: Date.now()
            });
            startVideoChat(); // O'zi uchun videoni ochadi
        }

        // 2. QO'NG'IROQNI KUZATISH (Signal kelishi)
        onValue(callRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.status === "calling" && data.caller !== USER_ROLE) {
                // Kiruvchi qo'ng'iroq
                document.getElementById('callScreen').style.display = 'flex';
                document.getElementById('callerName').innerText = data.caller + " qo'ng'iroq qilmoqda...";
                ringtone.play().catch(e => console.log("Ovoz uchun brauzerda bir marta ekranga bosing"));
            } else if (!data || data.status === "ended") {
                stopRingtone();
                document.getElementById('callScreen').style.display = 'none';
            }
        });

        window.acceptCall = function() {
            stopRingtone();
            document.getElementById('callScreen').style.display = 'none';
            startVideoChat();
        }

        window.rejectCall = function() {
            set(callRef, { status: "ended" });
        }

        function stopRingtone() {
            ringtone.pause();
            ringtone.currentTime = 0;
        }

        function startVideoChat() {
            document.getElementById('video-container').style.display = 'block';
            window.api = new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: "OilaChati_Maxfiy_777",
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: { displayName: USER_ROLE }
            });
        }

        window.closeCall = function() {
            if(window.api) window.api.dispose();
            document.getElementById('video-container').style.display = 'none';
            set(callRef, { status: "ended" });
        }

        // --- CHAT FUNKSIYALARI ---
        window.sendMsg = function() {
            const input = document.getElementById('msgInput');
            if (input.value.trim()) {
                push(chatRef, { sender: USER_ROLE, text: input.value });
                input.value = "";
            }
        }

        onChildAdded(chatRef, (snapshot) => {
            const msg = snapshot.val();
            const div = document.createElement('div');
            div.className = `msg ${msg.sender === USER_ROLE ? 'sent' : 'received'}`;
            div.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text}`;
            document.getElementById('chatBox').appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
