<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oila Chati</title>
    <script src="https://8x8.vc/vpaas-magic-cookie-8877665544332211/external_api.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: black; margin: 0; overflow: hidden; }
        .chat-container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #fff; position: relative; }
        
        /* Header */
        header { padding: 15px; background: #075e54; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .role-name { font-weight: bold; font-size: 18px; }
        
        /* Chat Box */
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcd41e2.png'); }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #fff; border-bottom-left-radius: 2px; }
        .msg strong { display: block; font-size: 11px; color: #075e54; margin-bottom: 3px; }
        
        /* Media */
        .chat-img, .chat-vid { max-width: 100%; border-radius: 5px; margin-top: 5px; display: block; }

        /* Input Area */
        .input-area { display: flex; padding: 10px; background: #f0f0f0; align-items: center; gap: 10px; }
        #msgInput { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; font-size: 15px; }
        .btn-icon { background: none; border: none; font-size: 24px; cursor: pointer; color: #555; transition: 0.2s; }
        .btn-icon:hover { color: #075e54; }
        .call-btn { background: #25d366; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }

        /* Call Screens */
        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; background: #000; }
        .call-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 94, 84, 0.95); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1500; text-align: center; }
        .call-overlay h2 { margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .call-buttons { display: flex; gap: 20px; }
        .accept-btn { background: #25d366; color: white; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        .reject-btn { background: #ff3b30; color: white; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="callScreen" class="call-overlay">
        <h2 id="callerInfo">Kiruvchi qo'ng'iroq...</h2>
        <div class="call-buttons">
            <button class="accept-btn" onclick="acceptCall()">JAVOB ✅</button>
            <button class="reject-btn" onclick="rejectCall()">RAD ETISH ❌</button>
        </div>
    </div>

    <div id="video-container">
        <button onclick="closeCall()" style="position:absolute; top:20px; right:20px; z-index:3000; background:red; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">Tugatish ❌</button>
        <div id="jitsi-container" style="height: 100%"></div>
    </div>

    <div class="chat-container">
        <header>
            <span class="role-name" id="displayRole">Erim</span>
            <button class="btn-icon call-btn" onclick="startCalling()">📞</button>
        </header>

        <div id="chatBox" class="chat-box"></div>

        <div class="input-area">
            <label for="fileInput" class="btn-icon">🖼️</label>
            <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
            <input type="text" id="msgInput" placeholder="Xabar yozing...">
            <button class="btn-icon" onclick="sendText()">➤</button>
        </div>
    </div>

    <audio id="ringtone" src="https://www.soundjay.com/phone/phone-calling-1.mp3" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg3gwfAr7Rkp9hAZxgbJeDdEIf2WZL1yU",
            authDomain: "chat-cb6f4.firebaseapp.com",
            databaseURL: "https://chat-cb6f4-default-rtdb.firebaseio.com",
            projectId: "chat-cb6f4",
            storageBucket: "chat-cb6f4.firebasestorage.app",
            messagingSenderId: "167580376836",
            appId: "1:167580376836:web:b0677a4359eb839daaba51"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");
        const callRef = ref(db, "activeCall");

        // --- ROLNI O'ZGARTIRING ---
        const USER_ROLE = "Eri"; // Xotinida "Xotini" deb yozing
        document.getElementById('displayRole').innerText = USER_ROLE;

        const ringtone = document.getElementById('ringtone');

        // 1. MATN YUBORISH
        window.sendText = function() {
            const input = document.getElementById('msgInput');
            if (input.value.trim()) {
                push(chatRef, { sender: USER_ROLE, type: 'text', content: input.value });
                input.value = "";
            }
        }

        // 2. RASM/VIDEO YUBORISH
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'ml_default');

            const res = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            push(chatRef, {
                sender: USER_ROLE,
                type: file.type.includes('image') ? 'image' : 'video',
                url: data.secure_url
            });
        };

        // 3. XABARLARNI QABUL QILISH
        onChildAdded(chatRef, (snapshot) => {
            const msg = snapshot.val();
            const div = document.createElement('div');
            div.className = `msg ${msg.sender === USER_ROLE ? 'sent' : 'received'}`;
            
            let html = `<strong>${msg.sender}</strong>`;
            if (msg.type === 'text') html += msg.content;
            else if (msg.type === 'image') html += `<img src="${msg.url}" class="chat-img" onclick="window.open('${msg.url}')">`;
            else if (msg.type === 'video') html += `<video src="${msg.url}" controls class="chat-vid">`;
            
            div.innerHTML = html;
            document.getElementById('chatBox').appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // 4. QO'NG'IROQNI BOSHLASH
        window.startCalling = function() {
            set(callRef, { caller: USER_ROLE, status: "ringing", id: Date.now() });
            openVideoUI();
        }

        // 5. SIGNALNI TINGLASH
        onValue(callRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.status === "ringing" && data.caller !== USER_ROLE) {
                // Kiruvchi qo'ng'iroq
                document.getElementById('callScreen').style.display = 'flex';
                document.getElementById('callerInfo').innerText = data.caller + " qo'ng'iroq qilmoqda...";
                ringtone.play().catch(() => console.log("Ekran ustiga bosing!"));
            } else if (!data || data.status === "ended") {
                // Qo'ng'iroq tugagan
                ringtone.pause();
                ringtone.currentTime = 0;
                document.getElementById('callScreen').style.display = 'none';
            }
        });

        window.acceptCall = function() {
            set(callRef, { status: "active", caller: USER_ROLE }); // Statusni o'zgartirish
            openVideoUI();
        }

        window.rejectCall = function() {
            set(callRef, { status: "ended" });
        }

        function openVideoUI() {
            document.getElementById('video-container').style.display = 'block';
            window.jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: "OilaChati_Maxfiy_Xona_999",
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: { displayName: USER_ROLE }
            });
        }

        window.closeCall = function() {
            if (window.jitsiApi) window.jitsiApi.dispose();
            document.getElementById('video-container').style.display = 'none';
            set(callRef, { status: "ended" });
        }
    </script>
</body>
</html>
